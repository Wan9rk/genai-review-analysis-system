<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GenAI 用户体验评价与痛点分析系统</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#0a0e17; }
    #viewport { position:fixed; inset:0; overflow:hidden; }
    #scale-stage { position:absolute; left:0; width:1920px; height:1080px; overflow:hidden; }
    #app { width:100%; height:100%; overflow:hidden; }
  </style>
</head>
<body>
  <div id="viewport">
    <div id="scale-stage">
      <div id="app"></div>
    </div>
  </div>

  <script>
    (function() {
      var stage = document.getElementById('scale-stage');
      var off = 0;

      function fit() {
        var z = window.innerWidth / 1920;
        stage.style.zoom = z;
        clamp(z);
      }

      function clamp(z) {
        var max = Math.max(0, 1080 - window.innerHeight / z);
        off = Math.max(0, Math.min(off, max));
        stage.style.top = (-off) + 'px';
      }

      window.addEventListener('wheel', function(e) {
        var z = window.innerWidth / 1920;
        off += e.deltaY / z;
        clamp(z);
        e.preventDefault();
      }, { passive: false });

      fit();
      window.addEventListener('resize', fit);
    })();
  </script>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
